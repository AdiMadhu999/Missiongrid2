name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.14.3"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APKs
        run: |
          ./gradlew clean
          ./gradlew assembleDebug
          ./gradlew assembleRelease
        working-directory: android
        
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_VER=$(grep versionName android/app/build.gradle | awk '{print $2}' | tr -d '"' | tr -d "'")
          echo "Detected App Version: $APP_VER"
          cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/app-release-${APP_VER}.apk
          
          # Publish latest tag
          gh release delete latest -y || true
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          
          gh release create latest \
            android/app/build/outputs/apk/release/app-release-${APP_VER}.apk \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release.apk \
            --target main \
            --title "Latest APK Build" \
            --notes "Automated build of the latest code on the main branch (Version ${APP_VER})."
            
          # Publish version tag
          gh release delete v${APP_VER} -y || true
          git tag -d v${APP_VER} || true
          git push origin :refs/tags/v${APP_VER} || true
          
          gh release create v${APP_VER} \
            android/app/build/outputs/apk/release/app-release-${APP_VER}.apk \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release.apk \
            --target main \
            --title "Release v${APP_VER}" \
            --notes "Automated release of the MissionGrid Android application version ${APP_VER}."

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MISSION_SELECTION_ULTIMATE != '' }}
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MISSION_SELECTION_ULTIMATE }}
          channelId: live
          projectId: mission-selection-ultimate
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MISSION_SELECTION_ULTIMATE }}
