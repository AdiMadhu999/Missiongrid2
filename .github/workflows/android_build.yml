name: Build Android APKs
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete old build artifacts and caches
        run: |
          rm -rf dist build android/app/src/main/assets/public .gradle node_modules/.cache android/app/build android/build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Print Node and NPM versions
        run: |
          node -v
          npm -v
      - name: Install dependencies
        run: npm ci
      - name: Build Web App
        run: npm run build
      - name: Print build metadata
        run: |
          echo "=== Generated Build Metadata ==="
          cat src/version.ts
      - name: Print web assets checksums
        run: |
          echo "Built Web Assets Checksums:"
          find dist -type f -exec md5sum {} + | sort -k 2
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Print Android assets checksums
        run: |
          echo "Android Assets Checksums:"
          find android/app/src/main/assets/public -type f -exec md5sum {} + | sort -k 2
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Generate or Use Persistent Keystore
        run: |
          if [ ! -f android/app/release.keystore ]; then
            echo "Keystore not found. Generating a persistent keystore..."
            keytool -genkey -v -keystore android/app/release.keystore -storetype JKS -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=MissionGrid, OU=Dev, O=Mission, L=City, ST=State, C=US"
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/release.keystore
            git commit -m "chore(android): generate persistent release keystore"
            git push origin main || true
          else
            echo "Persistent keystore found. Using existing one."
          fi
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.14.3"
      - name: Install Gradle and Regenerate Wrapper
        run: |
          sudo apt-get update && sudo apt-get install -y gradle
          gradle wrapper --gradle-version 8.14.3
        working-directory: android
      - name: Set executable permissions for Gradle Wrapper
        run: chmod +x gradlew
        working-directory: android
      - name: Clean and Build with Gradle Wrapper
        run: |
          ./gradlew clean
          ./gradlew assembleDebug
          ./gradlew assembleRelease
        working-directory: android
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read version from gradle build file
          APP_VER=$(grep versionName android/app/build.gradle | awk '{print $2}' | tr -d '"')
          cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/app-release-${APP_VER}.apk
          
          # Delete and recreate the 'latest' release to ensure it points to the newest code and contains the correct APKs
          gh release delete latest -y || true
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          
          gh release create latest \
            android/app/build/outputs/apk/release/app-release-${APP_VER}.apk \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release.apk \
            --target main \
            --title "Latest APK Build" \
            --notes "Automated build of the latest code on the main branch (Version ${APP_VER})."

          # Also create/update a release matching the exact version tag (e.g. v1.0.54) with the APKs
          gh release delete v${APP_VER} -y || true
          git tag -d v${APP_VER} || true
          git push origin :refs/tags/v${APP_VER} || true
          
          gh release create v${APP_VER} \
            android/app/build/outputs/apk/release/app-release-${APP_VER}.apk \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/release/app-release.apk \
            --target main \
            --title "Release v${APP_VER}" \
            --notes "Automated release of the MissionGrid Android application version ${APP_VER}."
