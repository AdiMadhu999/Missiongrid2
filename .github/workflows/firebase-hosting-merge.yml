name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  checks: write
  contents: write
  pull-requests: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.14.3"

      - name: Install Gradle and Regenerate Wrapper
        run: |
          sudo apt-get update && sudo apt-get install -y gradle
          gradle wrapper --gradle-version 8.14.3
        working-directory: android
          
      - name: Generate or Use Persistent Keystore
        run: |
          if [ ! -f android/app/release.keystore ]; then
            echo "Keystore not found. Generating a persistent keystore..."
            keytool -genkey -v -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=MissionGrid, OU=Dev, O=Mission, L=City, ST=State, C=US"
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add android/app/release.keystore
            git commit -m "chore(android): generate persistent release keystore"
            git push origin main || true
          else
            echo "Persistent keystore found. Using existing one."
          fi
          
      - name: Set executable permissions for Gradle Wrapper
        run: chmod +x gradlew
        working-directory: android

      - name: Clean and Build Android APKs
        run: |
          ./gradlew clean
          ./gradlew assembleDebug
          ./gradlew assembleRelease
        working-directory: android
        env:
          RELEASE_STORE_FILE: "release.keystore"
          RELEASE_STORE_PASSWORD: "password"
          RELEASE_KEY_ALIAS: "release"
          RELEASE_KEY_PASSWORD: "password"

      - name: Copy Compiled APKs to Web Dist Directory
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/app-debug.apk
          cp android/app/build/outputs/apk/release/app-release.apk dist/app-release.apk

      - name: Deploy to Firebase Hosting (Live Channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MISSION_SELECTION_ULTIMATE }}
          channelId: live
          projectId: mission-selection-ultimate

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
