# codemagic.yaml
workflows:
  capacitor-android:
    name: Capacitor Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build React application
        script: |
          npm run build
      - name: Sync Capacitor project with Android
        script: |
          npx cap sync android
      - name: Build Android Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
